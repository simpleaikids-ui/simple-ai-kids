<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lily Coloring Page · Simple AI Projects for Kids</title>
  <style>
    body { font-family: 'Fredoka', system-ui, sans-serif; margin: 0; padding: 24px; background: #fffbea; color: #1e1e2e; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 2rem; }
    p  { color: #475569; margin: 0 0 18px; }
    .sheet { background: #fff; max-width: 820px; margin: 0 auto; padding: 32px; border: 4px solid #1e1e2e; border-radius: 16px; box-shadow: 8px 8px 0 #1e1e2e; }
    svg { width: 100%; max-width: 720px; height: auto; }
    .noprint button { padding: 10px 18px; font: inherit; border-radius: 999px; border: 2px solid #1e1e2e; background: #fde047; cursor: pointer; margin: 12px 4px; }
    @media print {
      body { background: #fff; padding: 0; }
      .sheet { border: none; box-shadow: none; padding: 10px; }
      .noprint { display: none; }
    }
  </style>
</head>
<body>

  <div class="noprint">
    <button onclick="window.print()">🖨 Print this page</button>
    <button onclick="window.close()">✖ Close</button>
  </div>

  <div class="sheet">
    <h1>🦜 Color Lily the Parrot!</h1>
    <p>Lily is ready for crayons. Make her any color you want.</p>

    <svg viewBox="0 0 600 540" xmlns="http://www.w3.org/2000/svg" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- perch -->
      <line x1="120" y1="460" x2="480" y2="460"/>
      <line x1="140" y1="460" x2="140" y2="490"/>
      <line x1="460" y1="460" x2="460" y2="490"/>

      <!-- body -->
      <ellipse cx="300" cy="330" rx="120" ry="140"/>
      <!-- wing -->
      <path d="M235 280 Q200 340 245 420 Q300 430 320 400 Q330 340 300 290 Z"/>
      <!-- feathers on wing -->
      <path d="M245 310 Q255 330 270 340"/>
      <path d="M260 340 Q270 360 285 370"/>
      <path d="M275 370 Q285 390 300 400"/>

      <!-- head -->
      <circle cx="300" cy="180" r="92"/>
      <!-- cheek -->
      <circle cx="260" cy="200" r="14"/>
      <!-- eye -->
      <circle cx="325" cy="170" r="16"/>
      <circle cx="330" cy="165" r="5" fill="#000"/>
      <!-- eyebrow feather -->
      <path d="M305 140 Q320 115 350 130"/>

      <!-- beak -->
      <path d="M390 185 Q430 200 405 230 Q380 225 385 210 Z"/>
      <line x1="400" y1="205" x2="388" y2="212"/>

      <!-- crest feathers (tiny tufts) -->
      <path d="M260 105 Q270 85 282 100"/>
      <path d="M285 95  Q298 72 312 92"/>
      <path d="M315 92  Q330 72 345 95"/>

      <!-- tail feathers -->
      <path d="M230 440 Q210 490 180 510"/>
      <path d="M260 455 Q250 500 230 520"/>
      <path d="M290 465 Q290 510 280 530"/>

      <!-- feet -->
      <path d="M270 470 L260 495 M270 470 L275 495 M270 470 L285 495"/>
      <path d="M330 470 L320 495 M330 470 L335 495 M330 470 L345 495"/>

      <!-- speech bubble -->
      <path d="M430 90 Q430 50 490 50 L560 50 Q600 50 600 90 L600 130 Q600 170 560 170 L510 170 L495 195 L500 170 L490 170 Q430 170 430 130 Z" transform="translate(-40 -10) scale(0.75)"/>

      <!-- stars decoration -->
      <path d="M90 120 l6 14 l16 2 l-12 10 l4 16 l-14 -8 l-14 8 l4 -16 l-12 -10 l16 -2 Z"/>
      <path d="M500 380 l6 14 l16 2 l-12 10 l4 16 l-14 -8 l-14 8 l4 -16 l-12 -10 l16 -2 Z"/>
      <path d="M80 360 l4 10 l10 1 l-8 7 l3 11 l-9 -6 l-9 6 l3 -11 l-8 -7 l10 -1 Z"/>

    </svg>

    <p style="margin-top:18px">Made with 💛 by Simple AI Kids</p>
  </div>

</body>
</html>
